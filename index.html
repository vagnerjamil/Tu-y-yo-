<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para ella 💗</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(180deg, #ff9a9e 0%, #fecfef 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: white;
            text-align: center;
            padding: 20px;
            overflow-x: hidden;
            position: relative;
        }

        .title {
            font-size: 1.8rem;
            margin-top: 20px;
            margin-bottom: 25px;
            font-weight: bold;
            text-shadow: 1px 1px 4px rgba(0,0,0,0.15);
        }

        .photo-container {
            display: flex;
            justify-content: center;
            gap: 12px;
            max-width: 500px;
            width: 100%;
            margin-bottom: 25px;
        }

        .photo-card {
            flex: 1;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 8px 16px rgba(0,0,0,0.15);
            aspect-ratio: 9 / 16;
            background-color: rgba(255,255,255,0.2);
        }

        .photo-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .letter {
            max-width: 450px;
            padding: 0 15px;
            margin-bottom: 30px;
        }

        .letter p {
            font-size: 0.95rem;
            line-height: 1.5;
            margin-bottom: 12px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        /* CONTADOR DE TEMPO JUNTOS */
        .counter-section {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            padding: 20px;
            border-radius: 20px;
            width: 100%;
            max-width: 400px;
            margin-bottom: 30px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.18);
        }

        .counter-section h2 {
            font-size: 1.2rem;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .timer {
            display: flex;
            justify-content: space-around;
        }

        .time-block {
            display: flex;
            flex-direction: column;
        }

        .time-block span:first-child {
            font-size: 1.6rem;
            font-weight: bold;
        }

        .time-block span:last-child {
            font-size: 0.75rem;
            text-transform: uppercase;
            opacity: 0.9;
            margin-top: 4px;
        }

        /* PLAYER DE MÚSICA */
        .music-section {
            width: 100%;
            max-width: 400px;
            margin-bottom: 60px;
            z-index: 2;
        }

        .music-section iframe {
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
        }

        /* ANIMAÇÃO DOS CORAÇÕES NO FUNDO */
        .heart {
            position: absolute;
            bottom: -20px;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.6);
            pointer-events: none;
            animation: floatUp 6s linear infinite;
            z-index: 1;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(0) translateX(0) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh) translateX(50px) rotate(360deg);
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <div class="title">💖 Y ahora somos tú y yo 💖</div>

    <div class="photo-container">
        <div class="photo-card"><img src="foto1.jpg" alt="Nós"></div>
        <div class="photo-card"><img src="foto2.jpg" alt="Nós"></div>
        <div class="photo-card"><img src="foto3.jpg" alt="Nós"></div>
    </div>

    <div class="letter">
        <p>Prometo hacerte feliz, cuidarte y amarte todos los días.</p>
        <p>Hoy, 01/07, será un día que siempre recordaremos: el inicio de nuestro 'tú y yo' para siempre. 💞</p>
        <p>Mi vida... mi princesa... mi novia. 🥺💗</p>
    </div>

    <div class="counter-section">
        <h2>Tiempo Juntos 🗓️</h2>
        <div class="timer">
            <div class="time-block">
                <span id="days">00</span>
                <span>Días</span>
            </div>
            <div class="time-block">
                <span id="hours">00</span>
                <span>Horas</span>
            </div>
            <div class="time-block">
                <span id="minutes">00</span>
                <span>Min</span>
            </div>
            <div class="time-block">
                <span id="seconds">00</span>
                <span>Seg</span>
            </div>
        </div>
    </div>

    <div class="music-section">
        <iframe width="100%" height="80" src="https://www.youtube.com/embed/lG4XSUENwW4?controls=1" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
    </div>

    <script>
        // Configurado exatamente para o início do namoro: 1 de Julho de 2025
        const startDate = new Date(2025, 6, 1, 0, 0, 0); 

        function updateTimer() {
            const now = new Date();
            const diff = now - startDate;

            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
            const minutes = Math.floor((diff / 1000 / 60) % 60);
            const seconds = Math.floor((diff / 1000) % 60);

            document.getElementById('days').innerText = days.toString().padStart(2, '0');
            document.getElementById('hours').innerText = hours.toString().padStart(2, '0');
            document.getElementById('minutes').innerText = minutes.toString().padStart(2, '0');
            document.getElementById('seconds').innerText = seconds.toString().padStart(2, '0');
        }

        setInterval(updateTimer, 1000);
        updateTimer();

        // Chuva de corações flutuantes no fundo
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + "vw";
            heart.style.animationDuration = Math.random() * 3 + 4 + "s";
            heart.style.fontSize = Math.random() * 10 + 12 + "px";
            heart.style.opacity = Math.random() * 0.5 + 0.4;
            document.body.appendChild(heart);

            setTimeout(() => {
                heart.remove();
            }, 7000);
        }

        setInterval(createHeart, 400);
    </script>
</body>
</html>

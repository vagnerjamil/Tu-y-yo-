<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Para ela 💗</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- TELA 1 -->
<div id="tela1" class="tela ativa">
  <h1>✨ Para la mujer más hermosa del mundo ✨</h1>
  <p id="texto"></p>
  <button onclick="irTela2()">Continuar</button>
</div>

<!-- TELA 2 -->
<div id="tela2" class="tela">
  <div class="coracao" onclick="irTela3()">❤️</div>
  <p>Toca mi corazón ❤️</p>
</div>

<!-- PEDIDO -->
<div id="tela3" class="tela">
  <h1>¿QUIERES SER MI NOVIA?</h1>

  <div class="botoes">
    <button id="sim" onclick="sim()">💖 Sí</button>
    <button id="nao" onclick="nao()">💔 No</button>
  </div>

  <p id="msg"></p>
</div>

<!-- FINAL -->
<div id="final" class="tela">

  <h1>❤️ Y ahora somos tú y yo ❤️</h1>

  <div id="fotos">
    <img src="foto1.jpg" class="foto">
    <img src="foto2.jpg" class="foto">
    <img src="foto3.jpg" class="foto">
  </div>

  <p>
    Prometo hacerte feliz, cuidarte y amarte todos los días.<br><br>
    Hoy começa nossa história: tú y yo para siempre. 🥺❤️
  </p>
</div>

<audio id="musica" loop>
  <source src="musica.mp3" type="audio/mp3">
</audio>

<script src="script.js"></script>
</body>
  </html>
